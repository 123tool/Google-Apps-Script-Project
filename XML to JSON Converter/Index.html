<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
    .main-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
    .btn-primary { background: #6366f1; border: none; font-weight: bold; padding: 12px; }
    pre { background: #000; color: #10b981; border-radius: 10px; padding: 15px; max-height: 400px; }
  </style>
</head>
<body class="p-4">
  <div class="container">
    <div class="main-card p-5 shadow-lg">
      <h2 class="mb-4 text-center">🚀 XML to JSON Ultimate Tool</h2>
      <p class="text-center text-secondary">Powered by SPY-E & 123Tool</p>
      
      <div class="row mt-5">
        <div class="col-md-6">
          <label class="form-label">Input XML String</label>
          <textarea id="xmlInput" class="form-control bg-dark text-white border-secondary" rows="10"></textarea>
          <button onclick="process()" id="btnGo" class="btn btn-primary w-100 mt-3">PARSE & GENERATE PDF</button>
        </div>
        <div class="col-md-6">
          <label class="form-label">Live JSON Result</label>
          <pre id="jsonResult">Menunggu input...</pre>
          <div id="downloadArea" class="mt-3" style="display:none;">
             <a id="pdfLink" href="#" class="btn btn-success w-100">📥 DOWNLOAD PDF RESULT</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function process() {
      const xml = document.getElementById('xmlInput').value;
      const btn = document.getElementById('btnGo');
      if(!xml) return alert("XML kosong!");

      btn.disabled = true;
      btn.innerHTML = "Processing...";
      
      google.script.run.withSuccessHandler(res => {
        btn.disabled = false;
        btn.innerHTML = "PARSE & GENERATE PDF";
        
        if(res.success) {
          document.getElementById('jsonResult').innerText = JSON.stringify(res.data, null, 2);
          document.getElementById('downloadArea').style.display = 'block';
          document.getElementById('pdfLink').href = res.pdfUrl;
          alert("Berhasil! PDF telah dibuat dan Notifikasi terkirim.");
        } else {
          alert("Error: " + res.message);
        }
      }).processXml(xml);
    }
  </script>
</body>
</html>
